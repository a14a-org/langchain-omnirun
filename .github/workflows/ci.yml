name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # Matches requires-python = ">=3.10" in pyproject.toml.
          python-version: "3.14.6"
          cache: pip

      - name: Install dependencies
        # The private `omnirun` SDK is not published to PyPI, so the package
        # cannot be installed via `pip install .`. Install the resolvable
        # runtime and dev dependencies directly; tests/conftest.py stubs the
        # `omnirun` import and every test mocks the Sandbox.
        run: |
          python -m pip install --upgrade pip
          pip install "langchain-core>=0.2" "pydantic>=2" "pytest>=8" "ruff>=0.6" "mypy>=1.10"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: PYTHONPATH=. mypy langchain_omnirun

      - name: Test (pytest)
        run: PYTHONPATH=. python -m pytest -q
